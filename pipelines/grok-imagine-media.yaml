# TRUST BOUNDARY: this tracked YAML executes reviewed local shell commands.
# It MUST be invoked with root --riverboat-gambler, inspected with --dry-run,
# and run only in this trusted checkout. It performs no DA write.
name: throughline-grok-imagine-media
context:
  org: somarc
  repo: throughline
  branch: feature-throughline-tapestry
steps:
  - id: orientation
    command: status --format json

  - id: toolchain
    command: 'test -x /Users/mhess/.local/bin/grok && /Users/mhess/.local/bin/grok --version && command -v magick && command -v ffmpeg && command -v ffprobe'
    depends_on: [orientation]
    requires_approval: true
    timeout: 30s

  - id: prepare-staging
    command: 'rm -rf .da/media-staging && mkdir -p .da/media-staging/raw'
    depends_on: [toolchain]
    requires_approval: true
    timeout: 30s

  - id: imagine-character-lock
    command: '/Users/mhess/.local/bin/grok --cwd "$PWD" --sandbox throughline-media --prompt-file media/briefs/character-lock.md --output-format json --permission-mode bypassPermissions --tools "image_gen" --disable-web-search --disallowed-tools "Agent,web_search,web_fetch,run_terminal_cmd,read_file,search_replace" --deny "MCPTool(*)" --no-subagents --no-memory --max-turns 5 --verbatim > .da/media-staging/character-lock.run.json'
    depends_on: [prepare-staging]
    requires_approval: true
    timeout: 20m

  - id: collect-character-lock
    command: 'node tools/collect-grok-media.cjs image throughline-character-lock image_gen .da/media-staging/character-lock.run.json'
    depends_on: [imagine-character-lock]
    requires_approval: true
    timeout: 2m

  - id: imagine-panel-01
    command: '/Users/mhess/.local/bin/grok --cwd "$PWD" --sandbox throughline-media --prompt-file media/briefs/panel-01-the-drift.md --output-format json --permission-mode bypassPermissions --tools "image_edit" --disable-web-search --disallowed-tools "Agent,web_search,web_fetch,run_terminal_cmd,read_file,search_replace" --deny "MCPTool(*)" --no-subagents --no-memory --max-turns 5 --verbatim > .da/media-staging/panel-01.run.json'
    depends_on: [collect-character-lock]
    requires_approval: true
    timeout: 20m

  - id: collect-panel-01
    command: 'node tools/collect-grok-media.cjs image panel-01-the-drift image_edit .da/media-staging/panel-01.run.json'
    depends_on: [imagine-panel-01]
    requires_approval: true
    timeout: 2m

  - id: imagine-panel-02
